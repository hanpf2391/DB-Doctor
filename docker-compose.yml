version: '3.8'

services:
  db-doctor:
    image: hanpf23/db-doctor:0.1.0
    container_name: db-doctor
    ports:
      - "8080:8080"
    environment:
      # 时区设置
      - TZ=Asia/Shanghai
      # JVM 参数
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      # 持久化数据目录
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
